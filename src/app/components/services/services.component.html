<!-- Page Header Start -->
<div class="project-details-page">
	<div class="container-fluid page-header py-5 mb-5">
		<div class="container py-5">
			<h1 class="display-2 text-white mb-4 animated slideInDown fw-bold">Services</h1>
			<div class="breadcrumb-container mb-5 animated slideInDown">
				<nav aria-label="breadcrumb">
					<ol class="breadcrumb">
						<li class="breadcrumb-item">
							<a href="/" class="breadcrumb-link">
								<i class="fas fa-home me-2"></i>Home
							</a>
						</li>
						<li class="breadcrumb-item">
							<a href="/services" class="breadcrumb-link">
								<i class="fas fa-info-circle me-2"></i>Pages
							</a>
						</li>
						<li class="breadcrumb-item active" aria-current="page">
							<i class="fas fa-users me-2"></i>Services
						</li>
					</ol>
				</nav>
			</div>
		</div>
	</div>

	<!-- Services Section -->
	<section class="services-section py-5 mt-6">
		<div class="container">
			<div class="container section-title text-center fw-bold" data-aos="fade-up">
				<span class="description-title">Services</span>
				<h2 class="text-primary"> Our Expertise </h2>
				<p class="section-subtitle">
					Delivering excellence in land development and construction services
				</p>
			</div>
			<div class="row g-4">
				<div class="col-lg-4 col-md-4" *ngFor="let service of servicesBannerData; let i = index">
					<div class="service-card card h-100 border-0 shadow-sm" (click)="goToService(service.link)"
						style="cursor: pointer;">
						<div class="card-img-wrapper">
							<img src="{{imagePath}}/service/{{service.image}}" [alt]="service.name" class="card-img-top service-image">
							<div class="service-overlay">
								<div class="service-number">{{ i + 1 | number:'2.0' }}</div>
							</div>
						</div>
						<div class="card-body d-flex flex-column">
							<h5 class="card-title  mb-3">{{ service.name }}</h5>
							<p class="card-text text-muted mb-3">{{ service.short_desc }}</p>
							<p class="card-text mb-4 flex-grow-1" [innerHtml]="service.desc"></p>
							<a class="btn-primary raisin-black mt-auto" type="button">
								Learn More
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<!-- Page Header End -->
	<section class="together bgcl-primary">
	<div class="container-fluid">
		<div class="row">
			<div class="col-xl-10 col-lg-10 col-md-10 col-sm-11 col-11 mx-auto">
				<div class="row sectionmb" data-aos="fade-up" data-aos-duration="1000">
					<div class="col-xl-9 col-lg-8 col-md-6 col-sm-6 mb-md-0 mb-sm-0 mb-4">
						<div class="content-block w-100">
							<p class="size16 cloud-white csmb20">
								Have A Question?
							</p>
							<h2 class="size62 cloud-white csmb20">
								We're here To help You
							</h2>
							<a class="btn-secondary" style="text-transform: none" href="/contact">Contact Us</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
</div>
