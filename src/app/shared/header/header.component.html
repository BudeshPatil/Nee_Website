<header class="container-fluid navbar-wrapper">
  <div class="col-lg-10 offset-lg-1">
    <nav class="navbar navbar-dark navbar-expand-lg py-0">

      <!-- Logo -->
      <a routerLink="/" class="navbar-brand text-secondary">
        <img
          src="assets/logo/neelgund.png"
          width="160"
          height="50"
          title="Neelgund Developers"
          class="nav-logo"
          alt="Neelgund Logo"
        />
      </a>

      <!-- Mobile Toggle -->
      <button
        type="button"
        class="navbar-toggler me-0 bg-primary"
        (click)="toggleNavbar()"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->
      <div
        class="collapse navbar-collapse"
        [class.show]="isMenuOpen"
        id="navbarCollapse"
      >
        <div class="navbar-nav ms-auto mx-xl-auto p-0">

          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-item nav-link text-secondary"
            (click)="closeNavbar()"
          >
            Home
          </a>

          <a
            routerLink="/about"
            routerLinkActive="active"
            class="nav-item nav-link"
            (click)="closeNavbar()"
          >
            About
          </a>

          <a
            routerLink="/services"
            routerLinkActive="active"
            class="nav-item nav-link"
            (click)="closeNavbar()"
          >
            Services
          </a>

          <a
            routerLink="/projects"
            routerLinkActive="active"
            class="nav-item nav-link"
            (click)="closeNavbar()"
          >
            Projects
          </a>

          <a
            routerLink="/contact"
            routerLinkActive="active"
            class="nav-item nav-link"
            (click)="closeNavbar()"
          >
            Contact
          </a>

        </div>
      </div>

      <!-- Right Side (Desktop Only) -->
      <div class="d-none d-xl-flex flex-shirink-0">

        <!-- Phone Animation -->
        <div class="d-flex align-items-center justify-content-center me-4">
          <a
            href="tel:+918050238777"
            class="position-relative animated tada infinite"
          >
            <i class="fa fa-phone-alt text-secondary fa-2x"></i>
            <div class="position-absolute" style="top:-7px; left:20px;">
              <span>
                <i class="fa fa-comment-dots text-secondary"></i>
              </span>
            </div>
          </a>
        </div>

        <!-- Call Info -->
        <div class="d-flex flex-column pe-4 border-end">
          <span class="text-secondary-50">Have any questions?</span>
          <span class="text-secondary">Call: +91 80502 38777</span>
        </div>

        <!-- Search -->
        <div class="d-flex align-items-center justify-content-center ms-4">
          <a routerLink="/search">
            <i class="bi bi-search text-secondary fa-2x"></i>
          </a>
        </div>

      </div>
    </nav>
  </div>
</header>
