<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found | Ghost Rentals</title>
  <meta name="robots" content="noindex">
  <style>
    #notfound {
      position: relative;
      height: 100vh;
      background: #ffff;
    }

    #notfound .notfound {
      position: absolute;
      left: 50%;
      top: 50%;
      -webkit-transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .notfound {
      max-width: 767px;
      width: 100%;
      padding: 110px 40px;
      text-align: center;
    }

    .notfound .notfound-404 {
      position: relative;
    }

    .notfound .notfound-404 h1 {
      position: absolute;
      left: 50%;
      top: 50%;
      -webkit-transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      margin: 0px;
    }

    .notfound h2 {
      margin-top: 0px;
      margin-bottom: 25px;
    }
  </style>
</head>

<body>
  <div id="notfound">
    <div class="notfound">
      <div class="notfound-404">
        <p class="size80 redhat-bold gray-color">404-page </p>
      </div>
      <h1 class="size26 redhat-semibold gray-color text-uppercase mb-3 mb-lg-5">
        the page you requested could not found
      </h1>
      <h2 class="w-100 d-flex justify-content-center align-items-center">
        <a class="black-button size18 redhat-bold text-capitalize" href="/" data-text="Back To Home">
          <span>Back To Home</span>
        </a>
      </h2>
    </div>
  </div>
</body>

</html>
